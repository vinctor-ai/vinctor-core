name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    name: Python 3.11
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Run E2E demo
        run: python demo/boundary_registry_core_e2e.py

      - name: Run in-memory service demo
        run: python demo/in_memory_v1_service_demo.py

      - name: Run SQLite grant/audit demo
        run: python demo/sqlite_grant_audit_demo.py

      - name: Run SQLite boundary registry demo
        run: python demo/sqlite_boundary_registry_demo.py

      - name: Run SQLite V1 service demo
        run: python demo/sqlite_v1_service_demo.py

      - name: Run V1 HTTP contract demo
        run: python demo/v1_http_contract_demo.py

      - name: Run local V1 HTTP service demo
        run: python demo/local_v1_http_service_demo.py

      - name: Run boundary admin HTTP demo
        run: python demo/boundary_admin_http_demo.py

      - name: Run local service launch helper demo
        run: python demo/local_service_launch_helper_demo.py

      - name: Run local service bootstrap demo
        run: python demo/local_service_bootstrap_demo.py

      - name: Run Ruff
        run: ruff check .

      - name: Build package
        run: python -m build

      - name: Check whitespace
        run: git diff --check

  postgres:
    name: Postgres 16 storage contract
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vinctor
          POSTGRES_PASSWORD: vinctor-test
          POSTGRES_DB: vinctor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vinctor -d vinctor_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      VINCTOR_TEST_POSTGRES_DSN: postgresql://vinctor:vinctor-test@127.0.0.1:5432/vinctor_test
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"

      - name: Install Postgres test dependencies
        run: python -m pip install -e ".[dev,postgres]"

      - name: Run Postgres storage contract
        run: python -m pytest -q tests/test_postgres_storage.py
