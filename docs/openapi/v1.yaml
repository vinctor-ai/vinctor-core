openapi: 3.1.0
info:
  title: Vinctor Local V1 API
  version: 0.1.0
  description: Local prototype API contract. Not a hosted production service contract.
servers:
  - url: http://127.0.0.1:8765
security: []
paths:
  /healthz:
    get:
      summary: Check service health.
      description: Does not expose secrets, keys, grant refs, database path, or internal config.
      responses:
        "200":
          description: Service is reachable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v1/enforce:
    post:
      summary: Enforce one action/resource check with an issued grant.
      security:
        - AgentKey: []
      parameters:
        - name: X-Vinctor-Boundary-Id
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnforceRequest"
      responses:
        "200":
          description: Action permitted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PermitResponse"
        "403":
          description: Action denied.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DenyResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/AuthRequired"
  /v1/grant-requests:
    post:
      summary: Create an agent grant request.
      security:
        - AgentKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrantRequestCreate"
      responses:
        "201":
          description: Grant request created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/GrantRequest"
                  - type: object
                    properties:
                      routing_hint:
                        type: string
                        enum:
                          - pending_review
                          - auto_approval_available
                          - manual_review_required
                      routing_reason:
                        type: string
                      audit_event_id:
                        type: string
                        nullable: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/AuthRequired"
    get:
      summary: List workspace grant requests.
      security:
        - WorkspaceKey: []
      responses:
        "200":
          description: Workspace queue.
          content:
            application/json:
              schema:
                type: object
                required:
                  - grant_requests
                properties:
                  grant_requests:
                    type: array
                    items:
                      $ref: "#/components/schemas/GrantRequest"
        "401":
          $ref: "#/components/responses/AuthRequired"
  /v1/grant-requests/{request_id}:
    get:
      summary: Get one grant request.
      description: Agent-key callers can only read their own request.
      security:
        - AgentKey: []
        - WorkspaceKey: []
      parameters:
        - name: request_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Grant request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrantRequest"
        "401":
          $ref: "#/components/responses/AuthRequired"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/grant-requests/{request_id}/auto-approve:
    post:
      summary: Evaluate a pending grant request against auto-approval rules.
      security:
        - WorkspaceKey: []
      parameters:
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Approved or left pending.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrantRequestDecision"
        "401":
          $ref: "#/components/responses/AuthRequired"
  /v1/grant-requests/{request_id}/approve:
    post:
      summary: Manually approve a grant request.
      security:
        - WorkspaceKey: []
      parameters:
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DecisionReason"
      responses:
        "200":
          description: Approved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrantRequestDecision"
        "401":
          $ref: "#/components/responses/AuthRequired"
  /v1/grant-requests/{request_id}/reject:
    post:
      summary: Reject a grant request.
      security:
        - WorkspaceKey: []
      parameters:
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DecisionReason"
      responses:
        "200":
          description: Rejected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrantRequestDecision"
        "401":
          $ref: "#/components/responses/AuthRequired"
components:
  securitySchemes:
    AgentKey:
      type: apiKey
      in: header
      name: X-Agent-Key
    WorkspaceKey:
      type: apiKey
      in: header
      name: X-Workspace-Key
  parameters:
    RequestId:
      name: request_id
      in: path
      required: true
      schema:
        type: string
  responses:
    AuthRequired:
      description: Missing or invalid key.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadRequest:
      description: Invalid request body.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Object not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - service
        - mode
      properties:
        status:
          type: string
          enum:
            - ok
        service:
          type: string
          enum:
            - vinctor-service
        mode:
          type: string
          enum:
            - local
            - self_hosted
    EnforceRequest:
      type: object
      additionalProperties: false
      required:
        - grant_ref
        - action
        - resource
      properties:
        grant_ref:
          type: string
        action:
          type: string
        resource:
          type: string
    PermitResponse:
      type: object
      required:
        - decision
      properties:
        decision:
          const: permit
        grant_id:
          type: string
          nullable: true
        agent_id:
          type: string
          nullable: true
        scope_matched:
          type: string
          nullable: true
        audit_event_id:
          type: string
          nullable: true
    DenyResponse:
      type: object
      required:
        - decision
        - error
        - reason
      properties:
        decision:
          const: deny
        error:
          type: string
        reason:
          type: string
        grant_id:
          type: string
          nullable: true
        agent_id:
          type: string
          nullable: true
        audit_event_id:
          type: string
          nullable: true
    GrantRequestCreate:
      type: object
      additionalProperties: false
      required:
        - scopes
        - ttl_seconds
        - reason
      properties:
        scopes:
          type: array
          minItems: 1
          items:
            type: string
        ttl_seconds:
          type: integer
          minimum: 1
        reason:
          type: string
        task_id:
          type: string
        session_id:
          type: string
        boundary_id:
          type: string
        requester_runtime:
          type: string
        repo:
          type: string
        worktree:
          type: string
    GrantRequest:
      type: object
      required:
        - request_id
        - workspace_id
        - requester_agent_id
        - target_agent_id
        - requested_scopes
        - requested_ttl_seconds
        - reason
        - status
        - created_at
      properties:
        request_id:
          type: string
        workspace_id:
          type: string
        requester_agent_id:
          type: string
        target_agent_id:
          type: string
        requested_scopes:
          type: array
          items:
            type: string
        requested_ttl_seconds:
          type: integer
        reason:
          type: string
        status:
          type: string
          enum:
            - pending
            - approved
            - rejected
            - cancelled
            - expired
        created_at:
          type: string
          format: date-time
        decided_at:
          type: string
          format: date-time
          nullable: true
        decided_by:
          type: string
          nullable: true
        decision_reason:
          type: string
          nullable: true
        issued_grant_ref:
          type: string
          nullable: true
        task_id:
          type: string
          nullable: true
        session_id:
          type: string
          nullable: true
        boundary_id:
          type: string
          nullable: true
        requester_runtime:
          type: string
          nullable: true
        repo:
          type: string
          nullable: true
        worktree:
          type: string
          nullable: true
    GrantRequestDecision:
      allOf:
        - $ref: "#/components/schemas/GrantRequest"
        - type: object
          properties:
            grant:
              type: object
              nullable: true
            auto_approval:
              type: object
              nullable: true
            audit_event_id:
              type: string
              nullable: true
    DecisionReason:
      type: object
      additionalProperties: false
      properties:
        decision_reason:
          type: string
    ErrorResponse:
      type: object
      required:
        - error
        - reason
      properties:
        error:
          type: string
        reason:
          type: string
