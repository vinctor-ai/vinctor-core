<svg viewBox="0 0 800 430" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Vinctor — the control point that permits or denies each AI-agent action</title>
  <desc>An AI agent inherits your access. Vinctor sits in the middle as a control point that checks every tool call before it runs and returns a verdict — permit or deny — scoped by context (agent, action, resource, environment, grant, time). On the right are the systems the agent interacts with: production database, cloud accounts, CI/CD, secrets, and the open internet.</desc>
  <rect x="0.5" y="0.5" width="799" height="429" rx="18" fill="#FAF9F6" stroke="#E7E5DE" stroke-width="1"/>
  <text x="40" y="52" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="27" font-weight="700" fill="#2C2C2A" letter-spacing="-0.4">Runtime authorization for AI agents</text>
  <text x="40" y="80" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="400" fill="#6B6A66">An agent inherits your access. Vinctor decides, per action, what it is allowed to do.</text>
  <line x1="40" y1="100" x2="760" y2="100" stroke="#E7E5DE" stroke-width="1"/>
  <text x="118" y="135" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" fill="#6B6A66" letter-spacing="1">THE AGENT</text>
  <text x="396" y="135" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" fill="#5B4BE0" letter-spacing="1">THE CONTROL POINT</text>
  <text x="672" y="135" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10.5" font-weight="600" fill="#6B6A66" letter-spacing="0.6">SYSTEMS IT INTERACTS WITH</text>

  <rect x="44" y="162" width="148" height="196" rx="14" fill="#FFFFFF" stroke="#E7E5DE" stroke-width="1.5"/>
  <circle cx="118" cy="206" r="24" fill="#F3F1FB" stroke="#5B4BE0" stroke-width="1.5"/>
  <circle cx="118" cy="200" r="6.5" fill="none" stroke="#5B4BE0" stroke-width="1.6"/>
  <path d="M107 220 a11 11 0 0 1 22 0" fill="none" stroke="#5B4BE0" stroke-width="1.6"/>
  <text x="118" y="262" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700" fill="#2C2C2A">AI agent</text>
  <text x="118" y="284" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#6B6A66">Inherits your access</text>
  <text x="118" y="312" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#9A988F">shell · keys · tokens</text>
  <text x="118" y="328" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#9A988F">db · the open internet</text>

  <line x1="192" y1="252" x2="290" y2="252" stroke="#B8B6AE" stroke-width="1.5"/>
  <polygon points="290,252 282,248 282,256" fill="#B8B6AE"/>
  <text x="241" y="244" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10.5" fill="#8A8880">tool call</text>

  <rect x="296" y="166" width="208" height="200" rx="16" fill="#5B4BE0" opacity="0.06"/>
  <rect x="292" y="160" width="208" height="200" rx="16" fill="#FFFFFF" stroke="#5B4BE0" stroke-width="2"/>
  <g transform="translate(396,202)">
    <path d="M0,-24 L20,-15 L20,5 C20,20 11,29 0,35 C-11,29 -20,20 -20,5 L-20,-15 Z" fill="#F3F1FB" stroke="#5B4BE0" stroke-width="1.8"/>
    <circle cx="0" cy="2" r="5.5" fill="none" stroke="#5B4BE0" stroke-width="1.8"/>
    <line x1="0" y1="5.5" x2="0" y2="14" stroke="#5B4BE0" stroke-width="1.8"/>
  </g>
  <text x="396" y="266" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" font-weight="700" fill="#5B4BE0" letter-spacing="-0.3">Vinctor</text>
  <text x="396" y="286" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#2C2C2A">Checks every action first</text>
  <rect x="312" y="300" width="78" height="26" rx="9" fill="#E6F4EE" stroke="#1D9E75" stroke-width="1.4"/>
  <path d="M325 313 l3.5 3.5 6 -8" fill="none" stroke="#1D9E75" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="343" y="317" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11.5" font-weight="700" fill="#04342C">permit</text>
  <rect x="402" y="300" width="78" height="26" rx="9" fill="#FBEDE6" stroke="#D85A30" stroke-width="1.4"/>
  <path d="M414 308 l8 8 M422 308 l-8 8" fill="none" stroke="#D85A30" stroke-width="1.8" stroke-linecap="round"/>
  <text x="434" y="317" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11.5" font-weight="700" fill="#4A1B0C">deny</text>
  <text x="396" y="348" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#8A8880">a verdict on every call — audited either way</text>

  <g stroke="#CBC9C1" stroke-width="1.4" fill="none">
    <path d="M504 252 L586 186"/><path d="M504 252 L586 226"/><path d="M504 252 L586 266"/><path d="M504 252 L586 306"/><path d="M504 252 L586 346"/>
  </g>

  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="12.5" font-weight="600" fill="#2C2C2A">
    <rect x="588" y="172" width="168" height="28" rx="8" fill="#FFFFFF" stroke="#E7E5DE" stroke-width="1.25"/><ellipse cx="606" cy="182" rx="7" ry="2.8" fill="none" stroke="#6B6A66" stroke-width="1.3"/><path d="M599,182 v8 a7,2.8 0 0 0 14,0 v-8" fill="none" stroke="#6B6A66" stroke-width="1.3"/><text x="622" y="190">Production DB</text>
    <rect x="588" y="212" width="168" height="28" rx="8" fill="#FFFFFF" stroke="#E7E5DE" stroke-width="1.25"/><path d="M601,229 a6,6 0 0 1 1,-11.6 a7,7 0 0 1 13,1.2 a5,5 0 0 1 -1,10.4 Z" fill="none" stroke="#6B6A66" stroke-width="1.3"/><text x="622" y="230">Cloud accounts</text>
    <rect x="588" y="252" width="168" height="28" rx="8" fill="#FFFFFF" stroke="#E7E5DE" stroke-width="1.25"/><circle cx="606" cy="266" r="7" fill="none" stroke="#6B6A66" stroke-width="1.3"/><circle cx="606" cy="266" r="2.2" fill="#6B6A66"/><line x1="606" y1="259" x2="606" y2="261.5" stroke="#6B6A66" stroke-width="1.3"/><line x1="606" y1="273" x2="606" y2="270.5" stroke="#6B6A66" stroke-width="1.3"/><text x="622" y="270">CI / CD pipeline</text>
    <rect x="588" y="292" width="168" height="28" rx="8" fill="#FFFFFF" stroke="#E7E5DE" stroke-width="1.25"/><rect x="600" y="305" width="13" height="9" rx="1.6" fill="none" stroke="#6B6A66" stroke-width="1.3"/><path d="M602.5,305 v-2.5 a4,4 0 0 1 8,0 v2.5" fill="none" stroke="#6B6A66" stroke-width="1.3"/><text x="622" y="310">Secrets &amp; keys</text>
    <rect x="588" y="332" width="168" height="28" rx="8" fill="#FFFFFF" stroke="#E7E5DE" stroke-width="1.25"/><circle cx="606" cy="346" r="7" fill="none" stroke="#6B6A66" stroke-width="1.3"/><ellipse cx="606" cy="346" rx="3" ry="7" fill="none" stroke="#6B6A66" stroke-width="1.3"/><line x1="599.2" y1="346" x2="612.8" y2="346" stroke="#6B6A66" stroke-width="1.3"/><text x="622" y="350">The open internet</text>
  </g>

  <line x1="40" y1="384" x2="760" y2="384" stroke="#E7E5DE" stroke-width="1"/>
  <text x="40" y="410" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12.5" fill="#6B6A66">Every verdict is scoped by context — <tspan font-weight="600" fill="#2C2C2A">agent · action · resource · environment · grant · time</tspan></text>
  <text x="760" y="410" text-anchor="end" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#A7A59E" font-style="italic">Open source · early preview</text>
</svg>
